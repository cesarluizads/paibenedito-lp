server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Performance
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;

    # Gzip (apenas texto/css/js — nunca vídeo)
    gzip on;
    gzip_types text/html text/css application/javascript image/png image/jpeg application/json;
    gzip_comp_level 5;

    # ── HLS — segmentos de vídeo (.ts) ──
    location ~* \.ts$ {
        add_header Content-Type video/mp2t;
        add_header Cache-Control "public, max-age=2592000";
        add_header Access-Control-Allow-Origin *;
        expires 30d;
        sendfile on;
        tcp_nopush on;
    }

    # ── HLS — playlist (.m3u8) ──
    location ~* \.m3u8$ {
        add_header Content-Type "application/vnd.apple.mpegurl";
        add_header Cache-Control "no-cache, no-store";
        add_header Access-Control-Allow-Origin *;
        expires -1;
    }

    # ── Imagens — cache longo ──
    location ~* \.(png|jpg|jpeg|gif|ico|webp|svg)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
        sendfile on;
    }

    # ── HTML — sem cache ──
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    location / {
        try_files $uri $uri/ $uri.html =404;
    }
}
